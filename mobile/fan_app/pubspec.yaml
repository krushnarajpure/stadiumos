name: fan_app
description: "StadiumOS Fan Mobile Application - FIFA World Cup 2026 Edition"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing & Navigation
  go_router: ^12.1.3

  # HTTP Client & Network
  dio: ^5.4.0
  web_socket_channel: ^2.4.1

  # Storage & Cache
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0

  # Push Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # UI & Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
